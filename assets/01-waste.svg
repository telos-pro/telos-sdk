<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-label="Agent token efficiency — 25% effective">
  <defs>
    <linearGradient id="bgW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1130"/>
      <stop offset="1" stop-color="#2A1A4A"/>
    </linearGradient>
    <linearGradient id="wasted" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8851f"/>
      <stop offset="1" stop-color="#a14a08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="360" fill="url(#bgW)"/>

  <!-- Shared: donut rings + 25% number (language-neutral) -->
  <g transform="translate(220,200)">
    <circle r="100" fill="none" stroke="url(#wasted)" stroke-width="44"
            stroke-dasharray="471.24 628.32" stroke-dashoffset="0"
            transform="rotate(-90)"/>
    <circle r="100" fill="none" stroke="#7FD8E0" stroke-width="44"
            stroke-dasharray="157.08 628.32" stroke-dashoffset="-471.24"
            transform="rotate(-90)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Helvetica, Arial" font-size="40" fill="#FFFFFF" font-weight="bold">25%</text>
  </g>

  <!-- Shared: legend squares -->
  <g transform="translate(420,140)">
    <g transform="translate(0,28)"><rect width="14" height="14" fill="#d8851f"/></g>
    <g transform="translate(0,72)"><rect width="14" height="14" fill="#d8851f"/></g>
    <g transform="translate(0,116)"><rect width="14" height="14" fill="#d8851f"/></g>
    <g transform="translate(0,160)"><rect width="14" height="14" fill="#d8851f"/></g>
  </g>

  <!-- Chinese text (default visible) -->
  <g id="zh-text">
    <text x="430" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FFFFFF" font-weight="bold">今天的 agent，每 4 块钱有 3 块在打水漂</text>
    <text x="430" y="70" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" fill="#A78BFA">openclaw 等主流 harness 在真实长会话上的 token 利用率 ≈ 25%</text>
    <text transform="translate(220,200)" x="0" y="22" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" fill="#A78BFA">真正干活的 token</text>
    <g font-family="Helvetica, Arial" transform="translate(420,140)">
      <text font-size="14" fill="#FFFFFF" font-weight="bold">75% 在哪里被烧掉？</text>
      <g transform="translate(0,28)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">每一轮都重新 prefill 同一段开头 ——</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">cache 命中只付 10%，没命中按 100% 收</text>
      </g>
      <g transform="translate(0,72)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">每写一条笔记都先点一次贵的 LLM ——</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">大半笔记一辈子不会被读到，也照付</text>
      </g>
      <g transform="translate(0,116)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">用便宜档 token 当分母吹"省了几倍" ——</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">2026 年同族档位价差到 80×–150×</text>
      </g>
      <g transform="translate(0,160)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">辅助 evaluator 训练的 GPU-days ——</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">从来不进头条数字</text>
      </g>
    </g>
  </g>

  <!-- English text (hidden by default) -->
  <g id="en-text" display="none">
    <text x="430" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FFFFFF" font-weight="bold">Today's agents burn 3 out of every 4 dollars</text>
    <text x="430" y="70" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" fill="#A78BFA">Real long-session token utilization across mainstream harnesses (openclaw, etc.) ≈ 25%</text>
    <text transform="translate(220,200)" x="0" y="22" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#A78BFA">Tokens doing real work</text>
    <g font-family="Helvetica, Arial" transform="translate(420,140)">
      <text font-size="14" fill="#FFFFFF" font-weight="bold">Where does the 75% go?</text>
      <g transform="translate(0,28)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">Re-prefilling the same prefix every turn —</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">cache hit costs 10%, miss costs 100%</text>
      </g>
      <g transform="translate(0,72)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">Every memory write hits the expensive LLM first —</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">most notes are never read, but you pay anyway</text>
      </g>
      <g transform="translate(0,116)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">Inflating savings with cheap tokens as denominator —</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">same-family tier price gap is now 80×–150× in 2026</text>
      </g>
      <g transform="translate(0,160)">
        <text x="22" y="12" font-size="12" fill="#FFFFFF">GPU-days for training auxiliary evaluators —</text>
        <text x="22" y="28" font-size="12" fill="#FCB45A">never show up in the headline numbers</text>
      </g>
    </g>
  </g>

  <!-- Language toggle button (top-right) -->
  <g id="lang-toggle" cursor="pointer" onclick="toggleLang()" role="button" aria-label="Toggle language">
    <rect x="772" y="8" width="80" height="28" rx="5"
          fill="#FFFFFF" fill-opacity="0.12"
          stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1"/>
    <text id="btn-zh" x="796" y="27" text-anchor="middle"
          font-family="Helvetica, Arial" font-size="13"
          fill="#FFFFFF" font-weight="bold" opacity="1">中</text>
    <text x="812" y="27" text-anchor="middle"
          font-family="Helvetica, Arial" font-size="13"
          fill="#FFFFFF" opacity="0.35">|</text>
    <text id="btn-en" x="828" y="27" text-anchor="middle"
          font-family="Helvetica, Arial" font-size="13"
          fill="#FFFFFF" opacity="0.4">EN</text>
  </g>

  <script type="text/javascript">
  <![CDATA[
    var isEn = false;
    function toggleLang() {
      isEn = !isEn;
      var zh    = document.getElementById('zh-text');
      var en    = document.getElementById('en-text');
      var btnZh = document.getElementById('btn-zh');
      var btnEn = document.getElementById('btn-en');

      zh.setAttribute('display', isEn ? 'none' : '');
      en.setAttribute('display', isEn ? ''     : 'none');

      btnZh.setAttribute('opacity',     isEn ? '0.4'   : '1');
      btnZh.setAttribute('font-weight', isEn ? 'normal': 'bold');
      btnEn.setAttribute('opacity',     isEn ? '1'     : '0.4');
      btnEn.setAttribute('font-weight', isEn ? 'bold'  : 'normal');
    }
  ]]>
  </script>
</svg>
